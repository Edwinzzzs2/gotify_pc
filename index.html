<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotify 客户端</title>
    <link rel="icon" type="image/png" href="./defaultapp.png">
    <link rel="shortcut icon" type="image/png" href="./defaultapp.png">
    <link rel="stylesheet" href="./assets/tailwind.css">
    <style>
        html, body, #root { width: 100%; height: 100%; margin: 0; font-family: "Segoe UI", sans-serif; background: #f7fafc; }
        .scroll-thin::-webkit-scrollbar { width: 8px; }
        .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        #boot-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f7fafc; z-index: 9999; }
        .boot-card { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-radius: 12px; background: #ffffff; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
        .boot-icon { width: 40px; height: 40px; border-radius: 10px; object-fit: contain; }
        .boot-text { font-size: 16px; color: #1e293b; font-weight: 600; }
        .boot-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div class="boot-card">
            <img src="./defaultapp.png" alt="logo" class="boot-icon" />
            <div>
                <div class="boot-text">Gotify 客户端</div>
                <div class="boot-sub">正在加载历史消息...</div>
            </div>
        </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./renderer.js"></script>
</body>
</html>
